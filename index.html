<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pelanggaran Siswa MTSN</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #1faa59, #76ff7a);
  padding: 20px;
  margin: 0;
}

.container {
  max-width: 1000px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.header {
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

.logo {
  position: absolute;
  left: 0;
  display: flex;
  gap: 8px;
}

.logo img {
  width: 45px;
  height: 45px;
  object-fit: contain;
}

h1 {
  margin: 0;
}

.slogan {
  text-align: center;
  font-style: italic;
  color: #2e7d32;
  margin-top: 10px;
}

input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 15px;
  border: none;
  background: #1faa59;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #0f8a3c;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th {
  background: #1faa59;
  color: white;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
}

.danger {
  background: #ffdddd;
  color: red;
  font-weight: bold;
}

.total-box {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="logo">
    <!-- LOGO FIX (INI HARUS MUNCUL) -->
    <img src="logo mtsn.png">
    <img src="logo osis.png">
  </div>

  <h1>Pelanggaran Siswa MTSN Kota Madiun</h1>
</div>

<div class="slogan">
  "Disiplin hari ini, sukses di masa depan. Jangan melanggar aturan!"
</div>

<select id="kampus">
  <option value="kampus1">Kampus 1</option>
  <option value="kampus3">Kampus 3</option>
</select>

<br>

<input type="text" id="nama" placeholder="Nama">
<input type="text" id="kelas" placeholder="Kelas">
<input type="text" id="pelanggaran" placeholder="Pelanggaran">
<button onclick="tambahData()">Tambah</button>

<br>

<input type="text" id="search" placeholder="🔍 Cari nama..." onkeyup="filterData()">

<div class="total-box" id="total"></div>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Kelas</th>
<th>Pelanggaran</th>
<th>Total</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>

  <script>
const API = "https://script.google.com/macros/s/AKfycbxIDolVcldDWRDbxmgqBjiEyNP2Fh_0ZCnaxZ_a_UWz17aVMhcOK46Nkz2xX3Tf79pS/exec";

let semuaData = [];
let cacheHariIni = [];
let sedangSearch = false;

// 🔥 LOAD DATA SUPER CEPAT
async function ambilData() {

  try {

    let res = await fetch(API + "?t=" + Date.now());

    let data = await res.json();

    semuaData = data;

    // 🔥 cache hari ini biar gak filter ulang terus
    cacheHariIni = filterHariIni(semuaData);

    if (!sedangSearch) {
      render(cacheHariIni);
    }

  } catch(err) {

    console.log("Gagal load:", err);

  }

}

// 🔥 FILTER HARI INI
function filterHariIni(data) {

  let hariIni = new Date().toISOString().split("T")[0];

  return data.filter(d => {

    if (!d[3]) return false;

    let tgl = new Date(d[3]).toISOString().split("T")[0];

    return tgl === hariIni;

  });

}

// 🔥 TAMBAH DATA SUPER CEPAT
async function tambahData() {

  let nama = document
    .getElementById("nama")
    .value
    .trim()
    .toLowerCase();

  let kelas = document
    .getElementById("kelas")
    .value
    .trim()
    .toUpperCase();

  let pelanggaran = document
    .getElementById("pelanggaran")
    .value
    .trim()
    .toLowerCase();

  let kampus = document
    .getElementById("kampus")
    .value;

  if (!nama || !kelas || !pelanggaran) {
    alert("Isi semua!");
    return;
  }

  // 🔥 VALIDASI KELAS
  let regexKelas = /^(7|8|9)([A-Z])$/;

  if (!regexKelas.test(kelas)) {
    alert("Format kelas salah!\nContoh: 7A / 8B / 9H");
    return;
  }

  // 🔥 ANTI DUPLIKAT HARI INI
  let hariIni = new Date().toISOString().split("T")[0];

  let duplikat = semuaData.some(d => {

    if (!d[3]) return false;

    let tgl = new Date(d[3]).toISOString().split("T")[0];

    return (
      d[0]?.toLowerCase() === nama &&
      d[1]?.toUpperCase() === kelas &&
      d[2]?.toLowerCase() === pelanggaran &&
      tgl === hariIni
    );

  });

  if (duplikat) {
    alert("Data sama sudah ada hari ini!");
    return;
  }

  // 🔥 KONFIRMASI
  let yakin = confirm(
    "Yakin input?\n\n" +
    "Nama: " + capitalize(nama) + "\n" +
    "Kelas: " + kelas + "\n" +
    "Pelanggaran: " + pelanggaran
  );

  if (!yakin) return;

  // 🔥 LOADING CEPAT
  let tombol = document.querySelector("button");

  tombol.disabled = true;
  tombol.innerText = "Mengirim...";

  try {

    await fetch(API, {
      method: "POST",
      body: JSON.stringify({
        nama,
        kelas,
        pelanggaran,
        kampus
      })
    });

    // 🔥 TAMBAH LANGSUNG KE CACHE
    let dataBaru = [
      nama,
      kelas,
      pelanggaran,
      new Date().toISOString(),
      kampus
    ];

    semuaData.unshift(dataBaru);
    cacheHariIni.unshift(dataBaru);

    render(cacheHariIni);

    // RESET INPUT
    document.getElementById("nama").value = "";
    document.getElementById("kelas").value = "";
    document.getElementById("pelanggaran").value = "";

    alert("Data masuk!");

  } catch(err) {

    alert("Gagal kirim!");

  }

  tombol.disabled = false;
  tombol.innerText = "Tambah";

}

// 🔥 RENDER SUPER CEPAT
function render(data) {

  let tabel = document.getElementById("tabel");

  let gabung = {};

  // 🔥 TOTAL SEMUA HARI
  let totalAkumulasi = {};

  semuaData.forEach(d => {

    let key =
      d[0]?.toLowerCase().trim() + "_" +
      d[1]?.toUpperCase().trim();

    totalAkumulasi[key] =
      (totalAkumulasi[key] || 0) + 1;

  });

  // 🔥 GABUNG DATA HARI INI
  data.forEach(d => {

    let nama = d[0]?.toLowerCase().trim();
    let kelas = d[1]?.toUpperCase().trim();
    let pelanggaran = d[2]?.toLowerCase().trim();

    let key = nama + "_" + kelas;

    if (!gabung[key]) {

      gabung[key] = {
        nama,
        kelas,
        pelanggaran: [],
        total: totalAkumulasi[key] || 0
      };

    }

    gabung[key].pelanggaran.push(pelanggaran);

  });

  let hasil = Object.values(gabung)
    .sort((a,b) => b.total - a.total);

  // 🔥 HTML SEKALI RENDER (ANTI LAG)
  let html = "";

  hasil.forEach(d => {

    let merah = d.total >= 3 ? "danger" : "";

    html += `
      <tr class="${merah}">
        <td>${capitalize(d.nama)}</td>
        <td>${d.kelas}</td>
        <td>${d.pelanggaran.join(", ")}</td>
        <td>${d.total}</td>
      </tr>
    `;

  });

  tabel.innerHTML = html;

  document.getElementById("total").innerText =
    "Hari Ini: " + cacheHariIni.length +
    " | Total Semua: " + semuaData.length;

}

// 🔥 SEARCH SUPER CEPAT
function filterData() {

  let keyword = document
    .getElementById("search")
    .value
    .toLowerCase()
    .trim();

  if (keyword === "") {

    sedangSearch = false;

    render(cacheHariIni);

    return;
  }

  sedangSearch = true;

  let kata = keyword.split(" ");

  let hasil = semuaData.filter(d => {

    let nama = d[0]?.toLowerCase() || "";
    let kelas = d[1]?.toLowerCase() || "";

    let gabungan = nama + " " + kelas;

    return kata.every(k =>
      gabungan.includes(k)
    );

  });

  render(hasil);

}

// 🔥 FORMAT NAMA
function capitalize(text) {

  return text.replace(/\b\w/g, c =>
    c.toUpperCase()
  );

}

// 🔥 LOAD AWAL
ambilData();

// 🔥 AUTO REFRESH SUPER RINGAN
setInterval(() => {

  if (!sedangSearch) {
    ambilData();
  }

}, 30000);
</script>
