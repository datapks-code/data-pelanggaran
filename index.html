<script>
const API = "https://script.google.com/macros/s/AKfycbwmyF0PMT1i6TyZ5HjmjJ_M85_GVwGGBLLBhkPcVw0LVTyRHmo920C0xx-Hpd1Kg8GE/exec";

let semuaData = [];

// 🔥 ANTI DOUBLE
let lastData = "";
let lastTime = 0;

// TAMBAH DATA
function tambahData() {
  let nama = document.getElementById("nama").value.toLowerCase().trim();
  let kelas = document.getElementById("kelas").value.toUpperCase().trim();
  let pelanggaran = document.getElementById("pelanggaran").value.toLowerCase().trim();
  let kampus = document.getElementById("kampus").value;

  if (!nama || !kelas || !pelanggaran) {
    alert("Isi semua!");
    return;
  }

  // 🔥 CEK DOUBLE 2 DETIK
  let sekarang = Date.now();
  let dataSekarang = nama + "|" + kelas + "|" + pelanggaran;

  if (dataSekarang === lastData && (sekarang - lastTime) < 2000) {
    alert("Jangan klik 2x! Data sama terdeteksi.");
    return;
  }

  lastData = dataSekarang;
  lastTime = sekarang;

  fetch(API, {
    method: "POST",
    body: JSON.stringify({ nama, kelas, pelanggaran, kampus })
  })
  .then(() => {
    alert("Data masuk!");

    document.getElementById("nama").value = "";
    document.getElementById("kelas").value = "";
    document.getElementById("pelanggaran").value = "";

    ambilData();
  });
}

// AMBIL DATA
function ambilData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      semuaData = data.slice(1);
      tampilkanData();
    });
}

// 🔥 GABUNG + NORMALIZE + SORT
function tampilkanData(dataTampil = semuaData) {
  let tabel = document.getElementById("tabel");
  tabel.innerHTML = "";

  let dataGabung = {};

  dataTampil.forEach(d => {
    let nama = d[0].toLowerCase().trim();
    let kelas = d[1].toUpperCase().trim();
    let pelanggaran = d[2].toLowerCase().trim();

    let key = nama + "_" + kelas;

    if (!dataGabung[key]) {
      dataGabung[key] = {
        nama: nama,
        kelas: kelas,
        pelanggaran: [],
        total: 0
      };
    }

    dataGabung[key].pelanggaran.push(pelanggaran);
    dataGabung[key].total++;
  });

  // 🔥 SORT TERBANYAK DI ATAS
  let hasil = Object.values(dataGabung).sort((a, b) => b.total - a.total);

  let totalSemua = 0;

  hasil.forEach(d => {
    totalSemua += d.total;

    let merah = d.total >= 3 ? "danger" : "";

    tabel.innerHTML += `
      <tr class="${merah}">
        <td>${capitalize(d.nama)}</td>
        <td>${d.kelas}</td>
        <td>${d.pelanggaran.join(", ")}</td>
        <td>${d.total}</td>
      </tr>
    `;
  });

  document.getElementById("total").innerText =
    "Total Pelanggaran: " + totalSemua;
}

// 🔥 BIAR NAMA JADI RAPI (Miki bukan miki)
function capitalize(text) {
  return text.replace(/\b\w/g, c => c.toUpperCase());
}

// 🔍 SEARCH
function filterData() {
  let keyword = document.getElementById("search").value.toLowerCase();

  let hasil = semuaData.filter(d =>
    d[0].toLowerCase().includes(keyword)
  );

  tampilkanData(hasil);
}

// AUTO REFRESH
ambilData();
setInterval(ambilData, 1500);
</script>
