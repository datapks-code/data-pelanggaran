<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pelanggaran Siswa MTSN</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #1faa59, #76ff7a);
  padding: 20px;
  margin: 0;
}

.container {
  max-width: 1000px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.header {
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

.logo {
  position: absolute;
  left: 0;
  display: flex;
  gap: 8px;
}

.logo img {
  width: 45px;
  height: 45px;
  object-fit: contain;
}

h1 {
  margin: 0;
}

.slogan {
  text-align: center;
  font-style: italic;
  color: #2e7d32;
  margin-top: 10px;
}

input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 15px;
  border: none;
  background: #1faa59;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #0f8a3c;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th {
  background: #1faa59;
  color: white;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
}

.danger {
  background: #ffdddd;
  color: red;
  font-weight: bold;
}

.total-box {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="logo">
    <!-- LOGO FIX (INI HARUS MUNCUL) -->
    <img src="logo mtsn.png">
    <img src="logo osis.png">
  </div>

  <h1>Pelanggaran Siswa MTSN Kota Madiun</h1>
</div>

<div class="slogan">
  "Disiplin hari ini, sukses di masa depan. Jangan melanggar aturan!"
</div>

<select id="kampus">
  <option value="kampus1">Kampus 1</option>
  <option value="kampus3">Kampus 3</option>
</select>

<br>

<input type="text" id="nama" placeholder="Nama">
<input type="text" id="kelas" placeholder="Kelas">
<input type="text" id="pelanggaran" placeholder="Pelanggaran">
<button onclick="tambahData()">Tambah</button>

<br>

<input type="text" id="search" placeholder="🔍 Cari nama..." onkeyup="filterData()">

<div class="total-box" id="total"></div>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Kelas</th>
<th>Pelanggaran</th>
<th>Total</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwmyF0PMT1i6TyZ5HjmjJ_M85_GVwGGBLLBhkPcVw0LVTyRHmo920C0xx-Hpd1Kg8GE/exec";

let semuaData = [];

// 🔥 ANTI DOUBLE
let lastData = "";
let lastTime = 0;

// TAMBAH DATA
function tambahData() {
  let nama = document.getElementById("nama").value.toLowerCase().trim();
  let kelas = document.getElementById("kelas").value.toUpperCase().trim();
  let pelanggaran = document.getElementById("pelanggaran").value.toLowerCase().trim();
  let kampus = document.getElementById("kampus").value;

  if (!nama || !kelas || !pelanggaran) {
    alert("Isi semua!");
    return;
  }

  // 🔥 CEK DOUBLE 2 DETIK
  let sekarang = Date.now();
  let dataSekarang = nama + "|" + kelas + "|" + pelanggaran;

  if (dataSekarang === lastData && (sekarang - lastTime) < 10000) {
    alert("Jangan klik 2x! Data sama terdeteksi.");
    return;
  }

  lastData = dataSekarang;
  lastTime = sekarang;

  fetch(API, {
    method: "POST",
    body: JSON.stringify({ nama, kelas, pelanggaran, kampus })
  })
  .then(() => {
    alert("Data masuk!");

    document.getElementById("nama").value = "";
    document.getElementById("kelas").value = "";
    document.getElementById("pelanggaran").value = "";

    ambilData();
  });
}

// AMBIL DATA
function ambilData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      semuaData = data.slice(1);
      tampilkanData();
    });
}

// 🔥 GABUNG + NORMALIZE + SORT
function tampilkanData(dataTampil = semuaData) {
  let tabel = document.getElementById("tabel");
  tabel.innerHTML = "";

  let dataGabung = {};

  dataTampil.forEach(d => {
    let nama = d[0].toLowerCase().trim();
    let kelas = d[1].toUpperCase().trim();
    let pelanggaran = d[2].toLowerCase().trim();

    let key = nama + "_" + kelas;

    if (!dataGabung[key]) {
      dataGabung[key] = {
        nama: nama,
        kelas: kelas,
        pelanggaran: [],
        total: 0
      };
    }

    dataGabung[key].pelanggaran.push(pelanggaran);
    dataGabung[key].total++;
  });

  // 🔥 SORT TERBANYAK DI ATAS
  let hasil = Object.values(dataGabung).sort((a, b) => b.total - a.total);

  let totalSemua = 0;

  hasil.forEach(d => {
    totalSemua += d.total;

    let merah = d.total >= 3 ? "danger" : "";

    tabel.innerHTML += `
      <tr class="${merah}">
        <td>${capitalize(d.nama)}</td>
        <td>${d.kelas}</td>
        <td>${d.pelanggaran.join(", ")}</td>
        <td>${d.total}</td>
      </tr>
    `;
  });

  document.getElementById("total").innerText =
    "Total Pelanggaran: " + totalSemua;
}

// 🔥 BIAR NAMA JADI RAPI (Miki bukan miki)
function capitalize(text) {
  return text.replace(/\b\w/g, c => c.toUpperCase());
}

// 🔍 SEARCH
function filterData() {
  let keyword = document.getElementById("search").value.toLowerCase();

  let hasil = semuaData.filter(d =>
    d[0].toLowerCase().includes(keyword)
  );

  tampilkanData(hasil);
}

// AUTO REFRESH
ambilData();
setInterval(ambilData, 1500);
</script>
