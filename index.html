<script>
const API = "https://script.google.com/macros/s/AKfycbwmyF0PMT1i6TyZ5HjmjJ_M85_GVwGGBLLBhkPcVw0LVTyRHmo920C0xx-Hpd1Kg8GE/exec";

let semuaData = [];

// 🔥 ANTI DOUBLE
let lastData = "";
let lastTime = 3000;

// TAMBAH DATA
function tambahData() {
  let nama = document.getElementById("nama").value.trim();
  let kelas = document.getElementById("kelas").value.trim();
  let pelanggaran = document.getElementById("pelanggaran").value.trim();
  let kampus = document.getElementById("kampus").value;

  if (!nama || !kelas || !pelanggaran) {
    alert("Isi semua!");
    return;
  }

  // 🔥 CEK DATA SAMA + 2 DETIK
  let sekarang = Date.now();
  let dataSekarang = nama + "|" + kelas + "|" + pelanggaran;

  if (dataSekarang === lastData && (sekarang - lastTime) < 2000) {
    alert("Jangan klik 2x! Data sama terdeteksi.");
    return;
  }

  // simpan ke memory
  lastData = dataSekarang;
  lastTime = sekarang;

  fetch(API, {
    method: "POST",
    body: JSON.stringify({ nama, kelas, pelanggaran, kampus })
  })
  .then(() => {
    alert("Data masuk!");
    
    // kosongin input biar aman
    document.getElementById("nama").value = "";
    document.getElementById("kelas").value = "";
    document.getElementById("pelanggaran").value = "";

    ambilData();
  });
}

// AMBIL DATA
function ambilData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      semuaData = data.slice(1);
      tampilkanData();
    })
    .catch(err => {
      console.error("API error:", err);
      document.getElementById("tabel").innerHTML =
        "<tr><td colspan='4'>❌ Gagal ambil data</td></tr>";
    });
}

// 🔥 GABUNG + SORT
function tampilkanData(dataTampil = semuaData) {
  let tabel = document.getElementById("tabel");
  tabel.innerHTML = "";

  let dataGabung = {};

  dataTampil.forEach(d => {
    let key = d[0] + "_" + d[1];

    if (!dataGabung[key]) {
      dataGabung[key] = {
        nama: d[0],
        kelas: d[1],
        pelanggaran: [],
        total: 0
      };
    }

    dataGabung[key].pelanggaran.push(d[2]);
    dataGabung[key].total++;
  });

  let hasil = Object.values(dataGabung).sort((a, b) => b.total - a.total);

  let totalSemua = 0;

  hasil.forEach(d => {
    totalSemua += d.total;

    let merah = d.total >= 3 ? "danger" : "";

    tabel.innerHTML += `
      <tr class="${merah}">
        <td>${d.nama}</td>
        <td>${d.kelas}</td>
        <td>${d.pelanggaran.join(", ")}</td>
        <td>${d.total}</td>
      </tr>
    `;
  });

  document.getElementById("total").innerText =
    "Total Pelanggaran: " + totalSemua;
}

// 🔍 SEARCH
function filterData() {
  let keyword = document.getElementById("search").value.toLowerCase();

  let hasil = semuaData.filter(d =>
    d[0].toLowerCase().includes(keyword)
  );

  tampilkanData(hasil);
}

// AUTO REFRESH
ambilData();
setInterval(ambilData, 1500);
</script>
